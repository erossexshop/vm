<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eros Sex Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
 * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
}

/* Regla específica para bloquear interacción con imágenes */
img {
    pointer-events: none;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{\n  background:#0b0b0b;color:#f0e6f0;
  font-family:'Montserrat',sans-serif;font-weight:300;
  -webkit-font-smoothing:antialiased;min-height:100vh;
}
:root{
  --neon:#ff2d78;
  --neon-light:#ff6ba8;
  --neon-glow:0 0 8px #ff2d78,0 0 24px rgba(255,45,120,.4);
  --neon-glow-lg:0 0 14px #ff2d78,0 0 40px rgba(255,45,120,.3),0 0 80px rgba(255,45,120,.1);
  --bg:#0b0b0b;--bg-tint:#140c11;--card-bg:rgba(18,11,15,0.6);
  --text-muted:rgba(240,230,240,0.8);
  --text-dim:rgba(240,230,240,0.65);
  --border:rgba(255,45,120,0.15);
  --radius-lg:16px;--radius-md:10px;
}

/* ══ HEADER ════════════════════════════════════════════════════════════ */
.site-header{
  position:sticky;top:0;z-index:100;
  background:rgba(11,11,11,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.header-container{
  max-width:1200px;margin:0 auto;padding:0 20px;
  height:70px;display:flex;align-items:center;justify-content:space-between;
}
.logo-link{display:flex;align-items:center;text-decoration:none}
.logo-link img{
  height:42px;width:auto;display:block;
  filter:drop-shadow(0 0 6px rgba(255,45,120,0.6));
  animation:neonPulse 3s infinite ease-in-out;
}
@keyframes neonPulse{
  0%,100%{filter:drop-shadow(0 0 5px rgba(255,45,120,0.5)) opacity(0.95);}
  50%{filter:drop-shadow(0 0 14px rgba(255,45,120,0.85)) opacity(1);}
}

/* Nav Desktop */
.nav-desktop{display:flex;gap:28px}
.nav-desktop a{
  color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:400;
  letter-spacing:1px;text-transform:uppercase;transition:color .3s,text-shadow .3s;
}
.nav-desktop a:hover{color:#fff;text-shadow:var(--neon-glow)}

.ham-btn{
  background:none;border:none;color:#fff;font-size:24px;cursor:pointer;display:none;
}

/* ══ HERO SLIDER (SOLO IMAGEN Y COMPACTO) ═════════════════════════════ */
.hero-wrapper {
  max-width: 1200px;
  margin: 20px auto 0 auto;
  padding: 0 20px;
  display: none; /* Se activa por JS si hay destacados */
}
.hero-slider-container {
  position: relative;
  width: 100%;
  height: 380px; /* Altura más estilizada y comercial */
  background: #000;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.hero-slides {
  display: flex;
  width: 100%;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
}
.hero-slide {
  min-width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  overflow: hidden;
  background: radial-gradient(circle at center, rgba(255,45,120,0.08) 0%, #000 70%);
}
.hero-slide img {
  max-width: 90%;
  max-height: 85%;
  object-fit: contain;
  pointer-events: auto; /* Permite hacer clic en la imagen */
  transition: transform 0.5s ease;
  filter: drop-shadow(0 0 15px rgba(0,0,0,0.6));
}
.hero-slide:hover img {
  transform: scale(1.03);
}

/* Flechas de navegación */
.hero-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(11,11,11,0.6);
  border: 1px solid var(--border);
  color: #fff;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
  transition: all 0.3s ease;
  backdrop-filter: blur(4px);
}
.hero-arrow:hover {
  background: var(--neon);
  border-color: var(--neon-light);
  box-shadow: var(--neon-glow);
  color: #fff;
}
#heroPrev { left: 15px; }
#heroNext { right: 15px; }

/* Adaptación para celulares */
@media (max-width: 768px) {
  .hero-slider-container { height: 260px; }
  .hero-arrow { width: 36px; height: 36px; font-size: 14px; }
  #heroPrev { left: 8px; }
  #heroNext { right: 8px; }
}

/* ══ CATALOGUE ═════════════════════════════════════════════════════════ */
.catalog-section{max-width:1200px;margin:0 auto;padding:40px 20px 80px 20px}
.section-title{
  font-size:22px;font-weight:400;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:30px;color:#fff;border-left:4px solid var(--neon);padding-left:12px;
}
.grid-products{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:30px;
}

/* Tarjeta Individual */
.product-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;
  transition:transform .4s cubic-bezier(0.16,1,0.3,1),border-color .4s,box-shadow .4s;
  backdrop-filter:blur(6px);position:relative;
}
.product-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: var(--radius-lg);
    box-shadow: var(--neon-glow-lg);
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
}
.product-card:hover{
  transform:translateY(-6px);border-color:var(--neon-light);
}
.product-card:hover::before {
    opacity: 1;
}

.card-img-wrapper{
  width:100%;padding-top:100%;position:relative;background:#050505;
  border-bottom:1px solid var(--border);overflow:hidden;
}
.card-img-wrapper img{
  position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;
  transition:transform .6s cubic-bezier(0.16,1,0.3,1);
}
.product-card:hover .card-img-wrapper img{transform:scale(1.06)}

.card-body{padding:20px;display:flex;flex-direction:column;flex-grow:1;gap:8px}
.p-category{
  font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--neon);font-weight:500;
}
.p-name{
  font-size:15px;font-weight:400;color:#fff;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:42px;
}
.p-price{font-size:18px;font-weight:500;color:#fff;margin-top:auto;letter-spacing:0.5px}

/* ══ DRAWER RESPONSIVE ═════════════════════════════════════════════════ */
.drawer-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);
  z-index:998;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);
}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:-280px;width:280px;height:100vh;
  background:var(--bg-tint);border-left:1px solid var(--border);z-index:999;
  padding:40px 24px;display:flex;flex-direction:column;gap:24px;
  transition:right .3s cubic-bezier(0.16,1,0.3,1);
}
.drawer.open{right:0}
.drawer-close{
  align-self:flex-end;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;
}
.drawer-nav{display:flex;flex-direction:column;gap:20px;margin-top:20px}
.drawer-nav a{
  color:var(--text-muted);text-decoration:none;font-size:16px;font-weight:400;
  letter-spacing:1px;text-transform:uppercase;padding:8px 0;border-bottom:1px solid rgba(255,45,120,0.05);
}
.drawer-nav a:hover{color:#fff}

/* RESPONSIVE BREAKPOINTS */
@media(max-width:768px){
  .nav-desktop{display:none}
  .ham-btn{display:block}
  .grid-products{gap:20px;grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}
  .card-body{padding:12px;gap:4px}
  .p-name{font-size:13px;height:36px;-webkit-line-clamp:2}
  .p-price{font-size:15px}
  .catalog-section{padding-top:25px}
}

/* ══ SPLASH SCREEN DE BIENVENIDA ═══════════════════════════════════════ */
#splash-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000000;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.8s ease, transform 0.8s ease;
}
.splash-logo-container {
    position: relative;
    margin-bottom: 30px;
}
.splash-logo {
    width: 220px;
    height: auto;
    filter: drop-shadow(0 0 20px rgba(255, 45, 120, 0.7));
    animation: pulseGlow 2s infinite ease-in-out;
}
@keyframes pulseGlow {
    0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 45, 120, 0.6)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 35px rgba(255, 45, 120, 0.95)); transform: scale(1.03); }
}
.enter-btn {
    background: transparent;
    border: 2px solid var(--neon);
    color: #fff;
    padding: 12px 35px;
    font-size: 14px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 50px;
    box-shadow: var(--neon-glow);
    transition: all 0.3s ease;
}
.enter-btn:hover {
    background: var(--neon);
    box-shadow: var(--neon-glow-lg);
    transform: translateY(-2px);
}
body.preload {
    overflow: hidden;
}
</style>
</head>
